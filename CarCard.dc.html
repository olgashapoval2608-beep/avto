<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ car.open }}" style="background:#121514;border:1px solid #242927;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .35s cubic-bezier(.2,.7,.2,1),border-color .35s,box-shadow .35s;height:100%" style-hover="transform:translateY(-6px);border-color:rgba(76,217,123,.45);box-shadow:0 24px 48px -24px rgba(0,0,0,.85)">
  <div style="position:relative;height:176px;background:#0E100F">
    <sc-if value="{{ car.hasImg }}" hint-placeholder-val="{{ false }}">
      <div role="img" aria-label="{{ car.title }}" style="width:100%;height:100%;background-image:url('{{ car.img }}');background-size:cover;background-position:center"></div>
    </sc-if>
    <sc-if value="{{ car.noImg }}" hint-placeholder-val="{{ true }}">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(135deg,#121614 0 14px,#161B18 14px 28px)">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:#5C665F">PHOTO · {{ car.ph }}</span>
      </div>
    </sc-if>
    <div style="position:absolute;top:12px;left:12px;display:flex;gap:6px">
      <sc-if value="{{ car.badge }}" hint-placeholder-val="{{ false }}">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;font-weight:600;padding:5px 10px;border-radius:6px;backdrop-filter:blur(8px);background: {{ car.badgeBg }};color: {{ car.badgeColor }}">{{ car.badge }}</span>
      </sc-if>
    </div>
    <button onClick="{{ car.toggleSave }}" title="Зберегти" style="position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.15);background:rgba(11,13,12,.65);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s" style-hover="border-color:#4CD97B">
      <svg width="13" height="16" viewBox="0 0 13 16"><path d="M1 1 H12 V15 L6.5 10.5 L1 15 Z" fill="{{ car.saveFill }}" stroke="#4CD97B" stroke-width="1.4"></path></svg>
    </button>
  </div>
  <div style="padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div style="font-size:15.5px;font-weight:700;color:#F2F5F3;font-family:'Manrope',sans-serif">{{ car.title }}</div>
      <div style="text-align:right">
        <div style="font-size:16px;font-weight:800;color:#4CD97B;white-space:nowrap;font-family:'Manrope',sans-serif">{{ car.priceFmt }}</div>
        <sc-if value="{{ car.opFmt }}" hint-placeholder-val="{{ false }}">
          <div style="font-size:11.5px;color:#5C665F;text-decoration:line-through;font-family:'Manrope',sans-serif">{{ car.opFmt }}</div>
        </sc-if>
      </div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#98A29C;margin-top:6px">{{ car.sub }}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:13px;padding-top:12px;border-top:1px solid #1C211E">
      <span style="width:7px;height:7px;border-radius:50%;background: {{ car.stColor }}"></span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:#98A29C">{{ car.st }}</span>
      <span style="margin-left:auto;font-size:12.5px;font-weight:600;color:#5C665F;font-family:'Manrope',sans-serif">Детальніше →</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:330},&quot;car&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;,&quot;default&quot;:{&quot;title&quot;:&quot;Mazda 3 Preferred&quot;,&quot;priceFmt&quot;:&quot;$13,999&quot;,&quot;sub&quot;:&quot;2023 · 10 тис. миль · Бензин 2.5&quot;,&quot;ph&quot;:&quot;MAZDA 3&quot;,&quot;noImg&quot;:true,&quot;badge&quot;:&quot;NEW ARRIVAL&quot;,&quot;badgeBg&quot;:&quot;rgba(125,184,255,.14)&quot;,&quot;badgeColor&quot;:&quot;#7DB8FF&quot;,&quot;st&quot;:&quot;В ДОРОЗІ&quot;,&quot;stColor&quot;:&quot;#FFB04C&quot;,&quot;saveFill&quot;:&quot;none&quot;}}}"></script>
</body>
</html>
